 # --- Events ---
 wwu_mission_stromgarde.1.title: "Foreign Claim - Gun Darok"
 wwu_mission_stromgarde.1.desc: "Recently, a diplomat from the human kingdom of Stromgarde had arrived to our gates with a proposition. They see our old fortress of Gun Darok, located on the border of Hillsbrad and Arathi region as a strategic location. Within the message from the Stromic monarch, they consider paying us a generous price if we decide to abandon our desires to reclaim it, allowing them to settle the old hold. While having the strategic fortress in the area would be always beneficial, we could consider if our relations with them are more valuable than a place we have abandoned before?"
 wwu_mission_stromgarde.1.option.a: "We can accept such offer."
 wwu_mission_stromgarde.1.option.b: "We are not interested."

 wwu_mission_stromgarde.2.title: "Rejection of Gun Darok Deal"
 wwu_mission_stromgarde.2.desc: "Our deal has been rejected by the ruler of the dwarven kingdom."
 wwu_mission_stromgarde.2.option.a: "We will have it another way, sooner or later."

 wwu_mission_stromgarde.10.title: "Stormic Ultimatum"
 wwu_mission_stromgarde.10.desc: "We have received an ultimatum from the nation of Stromgarde. They demand our willing subjegation under their crown!"
 wwu_mission_stromgarde.10.option.a: "Over our dead bodies. Altarac does not kneel!"
 wwu_mission_stromgarde.10.option.b: "A dark day for our nation indeed..."

 wwu_mission_stromgarde.11.title: "Rejection of Stormic Ultimatum"
 wwu_mission_stromgarde.11.desc: "The Rats of Alterac had rejected our offer of willing surrender of their kingdom under our crown. They think themselves as not defeated, spitting in our faces!"
 wwu_mission_stromgarde.11.option.a: "Diplomacy is on our side, they will see it."
 wwu_mission_stromgarde.11.option.b: "Funny. Let's make sure they choke on their decision."

 # --- Tooltips ---

 stormgarde_flexible_diplomacy_tt: "§YStromgarde§! gets §Y'Flexible Diplomacy'§! until the end of the game, giving:\n- Diplomatic Relations: §G+1§!\n- Aggressive Expansion Impact: §G-10.0%§!\n- Improve Relations: §G+10.0%§!\n\nAdditionally, unlocks the following decisions:\n- §YSettle Claim - Gun Darok§!\n- §YResettlement of Southshore§!"

 stromgarde_countryside_militarization_trigger_tt: "Every province in §YArathi Highlands§! is owned by Stromgarde and has:\n- Barracks\n- Arsenal\n- Training Grounds"

 stromgarde_no_trolls_tt: "All provinces in §YThe Hinterlands§! are liberated from the §YTroll§! primitive rule."

 stromgarde_troll_defeat_mission_tt: "§GRewards:§!\nUnlock the Nobility Privilege §YTrollbane Duty§! which can be activated if we have any troll presence within our lands.\nGain §Y25§! Prestige or Monarch Power.\nGain §Y10§! Power Projection."

 trollbane_legacy_mission_tt: "All trolls within §YLordaeron§! and §YQuel'thalas§! are eradicated. The era of trolls shall be over."

 STROMKAR_RECOVERY_TT: "If  §RStrom'kar the Warbreaker§! was not recovered by anyone, we will discovery its location immidietly."

 arathi_basin_fortification_tt: "§YFortify the Arathi Basin§!\n\n• §YArathi Basin§! has a Fort and §Y3 Base Manpower§!.\n• Control §YRevantusk Outpost§!, §YTrollden§!, §YArathi Strand§!, §YThickets of Askar§!, and §YNorthstar Outpost§!.\n• At least one of these provinces has a Fort."

 unlock_settlement_decisions_tt: "§GUnlock the following Decisions:§!\n• §YSettle Claim - Gun Darok§!\n• §YSettle Claim - Dalaran Southshore§!\n• §YSettle Claim - Lordaeron Southshore§!"

