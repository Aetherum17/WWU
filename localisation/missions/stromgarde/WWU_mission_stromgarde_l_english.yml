 # Column 4
 A16_restore_stromic_hearthland_title: "Restore the Stromic Hearthland"
 A16_restore_stromic_hearthland_desc: "With the current times whispering about great shift in power, we, the stormic people must act once more. While our current situation is but a shadow of the once proud Empire of Arathor, we must not forget that we are still their rightful heirs. Stromgarde sits upon Strom, the first of humanity great cities. But we are surrounded at all sides by those who want to see our precious kingdom burn. We will never all this! Glory to Stromgarde, may our enemies fear our might!"
 
 A16_secure_the_stromic_coast_title: "Secure the Stromic Coast"
 A16_secure_the_stromic_coast_desc: "Our efforts in fighting off the enemy forces and the inhuman creatures we tolerated far too long finally showed up efforts. Arathi Highlands are secured, at least for now. To our west, there are human kingdoms who can be both allies and enemies, so we must approach carefully. To the East, the enemy of our kind, Trolls call the lands their homes. Both have to be evaluated and reinforced. We must grow in strenght when enemies are so close."

 A16_country_militarization_title: "Countryside Militarization"
 A16_country_militarization_desc: "Stormic people have a long history of war. We were the first to unite humanity in the past, due to both our wisdom and strenght. Now, the time has come for us to do so again. Every man and woman, every elder and child, all must understand value of our might!"

 A16_proclaim_the_might_of_stromgarde_title: "Proclaim the Might of Stromgarde"
 A16_proclaim_the_might_of_stromgarde_desc: "Once more, we are on top. The long path from the Stromgarde Keep continues far and wide. We were not broken, instread breaking them. The power, the might, the glory is the tale that has once name. Stromgarde, the heir of Arathor!"

 # Column 5
 A16_restore_the_empire_of_arathor_title: "Restore the Empire of Arathor"
 A16_restore_the_empire_of_arathor_desc: "At long last, the unity is once more. The Seven Kingdoms of Men stand united under one banner. One people. One mission. No longer we just claim. Now, we are one! We are the Arathor reborn!"

 A16_protect_the_eastern_flank_title: "Protect the Eastern Flank"
 A16_protect_the_eastern_flank_desc: "While we have reclaimed our home territories, the menace of the forest trolls is right at our borders, mocking us from their temple-cities. Before we enter the enemy lands, we must prepare our defences, so that our people will not suffer the raids and pillages."

 A16_establish_hinterland_outpost_title: "Establish Hinterlands Outpost"
 A16_establish_hinterland_outpost_desc: "With the sword and shield in hand, hundreds of our brave warriors crossed the borders and conquered the first of many places that those primitives call civilization. The first spearhead is done, now we must prepare to destroy their resistance."

 A16_defeat_hinterlands_trolls_title: "Defeat of Hinterlands Trolls"
 A16_defeat_hinterlands_trolls_desc: "One by one they failed. Witherbark, Revantusk, Vilebranch. Names that only achivisits and bards will remember as reminders of the threat that once was. No more do they post any. The wooden palisades crumbled, the temples collapsed and their people surrendered or died. Jintha'alor, the holy temple-city now burns in blaze in glory. Stormic Glory."

 A16_trollbane_legacy_title: "Trollbane Legacy" 
 A16_trollbane_legacy_desc: "One does not simply abandon their legacy. Even with the forest beast put down all around Hinterlands, the trolls are not yet defeated. They could rise and become the issue once more. But Trollbanes do not give up easily. We will continue our mission to eradicate them, now not only near our border, but all acorss Lordaeron and Quel'thalas!"
 
