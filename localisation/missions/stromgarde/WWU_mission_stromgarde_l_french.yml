 # --- Events ---
 wwu_mission_stromgarde.1.title: "Foreign Claim - Gun Darok"
 wwu_mission_stromgarde.1.desc: "Recently, a diplomat from the human kingdom of Stromgarde had arrived to our gates with a proposition. They see our old fortress of Gun Darok, located on the border of Hillsbrad and Arathi region as a strategic location. Within the message from the Stromic monarch, they consider paying us a generous price if we decide to abandon our desires to reclaim it, allowing them to settle the old hold. While having the strategic fortress in the area would be always beneficial, we could consider if our relations with them are more valuable than a place we have abandoned before?"
 wwu_mission_stromgarde.1.option.a: "We can accept such offer."
 wwu_mission_stromgarde.1.option.b: "We are not interested."

 wwu_mission_stromgarde.2.title: "Rejection of Gun Darok Deal"
 wwu_mission_stromgarde.2.desc: "Our deal has been rejected by the ruler of the dwarven kingdom."
 wwu_mission_stromgarde.2.option.a: "We will have it another way, sooner or later."

 wwu_mission_stromgarde.10.title: "Fate of Alterac"
 wwu_mission_stromgarde.10.desc: "With their realm under our occupation, its time we end their crown once and for all. Alterac and Stromgarde will reunite once more, one way or another."
 wwu_mission_stromgarde.10.option.a: "They shall serve under the end of days."
 wwu_mission_stromgarde.10.option.b: "Let them be our loyal dogs for now. In time, they will become one with us."
 wwu_mission_stromgarde.10.option.c: "I think we can negociate this in another way..."

 wwu_mission_stromgarde.11.title: "Ravenholdt Future"
 wwu_mission_stromgarde.11.desc: "Stromgarde demands our servitude. They desire our holds and our leaders to anwser to them alone. What will we do?"
 wwu_mission_stromgarde.11.option.a: "We can't possibly win this."
 wwu_mission_stromgarde.11.option.b: "Ravenholdt will not submit so easily."

 wwu_mission_stromgarde.20.title: "Military Reforms from Stromgarde Keep"
 wwu_mission_stromgarde.20.desc: "Recently, our military started to suffer from the lack of proper organization. Many commanders use different strategies, confusing each other in the wake of battle. For this, we have called few notable individuals to propose their ideas for our future tactics."
 wwu_mission_stromgarde.20.option.a: "We will go with Nilas's proposal."
 wwu_mission_stromgarde.20.option.b: "We will go with Wrenn's proposal."
 wwu_mission_stromgarde.20.option.c: "We will go with Valorcall's proposal."

