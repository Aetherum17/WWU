 # Column 1
 A16_establish_lordaeron_connections_title: "Establish Lordaeron Connections"
 A16_establish_lordaeron_connections_desc: "While we have received help from the noble king of Lordaeron in the dire times, we have not previously established proper diplomatic ties or relations with the largest of the human kingdoms. It is time we correct our mistake and establish a friendly relations."

 A16_dalaran_ties_title: "Dalaran Ties"
 A16_dalaran_ties_desc: "Dalaran stands as the first of the human nations emergind from the fractures of old Arathorian Empire. Being the first major city and the capital of mages to study and practice magic, Dalaran had become a major political entity and important center of magical discovery. We should establish good relations with them so that we might one day benefit from their ways."

 A16_flexible_diplomacy_title: "Flexible Diplomacy"
 A16_flexible_diplomacy_desc: "Diplomacy is a tricky art that requires both bright minds and subtle artisty in the way of negociation. It is a path to many closed doors, allies and enemies alike. If we are trive in this age, we must remind ourselves that might doesn't always make us right. Some subjects require subtle actions."

 A16_stromgarde_development_title: "Stromgarde's Growth"
 A16_stromgarde_development_desc: "For many decades, city of Strom had seen a slow decline, loosing its enconomical, cultural and military importance. It is time we finally put an end to this decline and revive the once glorious city."

 A16_squares_development_title: "Expansion of Square Districts"
 A16_squares_development_desc: "City of Strom is divided to the specific districts, often called Squares. Among them stands many markets, centers of production, culturally significant landmarks and shady places on can get what they desire. Still, for administration, we must ensure infractructure of these places is modern and ensure nothing will collapse should the distaster strike."

 A16_stromgarde_keep_dev_title: "The Stromgarde Keep"
 A16_stromgarde_keep_dev_desc: "Stromgarde Keep is the head of power for the whole Kingdom of Stromgarde, housing both military and administrative elite, as well as being the royal seat of power. From there many most important decisions come and go with the envoys of diplomats, uneasy commanders and ever so grumpy leaders of the people."

 # Column 2
 A16_dwarven_ties_title: "Dwarven Relations"
 A16_dwarven_ties_desc: "The Dwarven Kingdom of Ironforge emerged many years ago and we have on occasion visited one another during relevant political events. However, to the west of our own capital lies the old dwarven fortress, populated by the notable numbers of ironforge dwarves. Due to this, and many other political factors we should open a diplomatic channel between Stromgarde and Ironforge."

 A16_insult_the_alteraci_title: "Insult the Alteraci"
 A16_insult_the_alteraci_desc: "With history between Stormic and Alteraci kingdom is not particuralty long, its is tale of continous conflict of noble titles, trade disagreements and spheres of influence. While we went back and forward on many occasions, the times call for us to let the embers rise once, so that we may put down the fire once and for all."
 
 A16_punish_the_alteraci_title: "Humiliate Alterac"
 A16_punish_the_alteraci_desc: "With our show of force over Kingdom of Alterac and their presumptuous noble elites, we have proven our superiority. With the Altarac humiliated, it is time we break their fragile crown and become the rulers of their realm."

 A16_alterac_war_title: "Alterac War"
 A16_alterac_war_desc: "Our advances cannot be stopped. The fragile realm crumbles under our forces, its soldiers either slain, captured or deserted. The seat of their fleeing royal power has already been captured, and its only a matter of time before all of their lands surrender to our direct control. Its time to sit at the table of winners, and make sure our demands are heard. Loud and clear."

 A16_gilneas_invasion_title: "Invasion of Gilneas"
 A16_gilneas_invasion_desc: "With our landing on the Tempest and Purgation isles, we have managed to create a foothold, a comfortable beachhead for our soldiers. While the kingdoms of Gilneas and Stromgarde had a history of both alliances and rivalries, the tides of history show that we are on the path of reunification of our realms. All human kingdoms have risen from the decline of our previous empire, and now it's time we bring some of them back under our control."

 A16_gilneas_subjegation_title: "Gilnean Subjegation"
 A16_gilneas_subjegation_desc: "The Gilneas Peninsula has been subjegated. While the remnants of the previous kings might still resist us, hoping their action can resolve in their direct rule, it is an important step in the direction of reunification of the Arathorian Empire."

 A16_tower_district_title: "Development of the Tower District"
 A16_tower_district_desc: "The Tower Distict houses the mages of Stromgarde, allowing them to study their magical arts within safery of the city. Here stands Tower of Arathor, one of the first mage towers across the seven kingdoms. While in recent time the importance of this location had withered away, with our intervention we will eventually be able to restore the nessesary institutions."

 # Column 3
 A16_claim_the_mantle_of_humanity_title: "Claim the Mantle of Humanity"
 A16_claim_the_mantle_of_humanity_desc: "Protection of Humanity is a mission that had formed the first of the human empire. We are the earls to that quest, destined to embrace it and ensure humanity as it stands will endure."
 
 A16_protect_the_western_flank_title: "Protect the Western Flank"
 A16_protect_the_western_flank_desc: "Even with the shoreline under our control, we must ensure our enemies will not be able to easily cross and invade our realm. We must protect this border!"

 A16_southshore_control_title: "Southshore Control"
 A16_southshore_control_desc: "Southshore stands as important center of commerce and strategic control. Tarren Mill and Southshore has been subject of many diplomatic and noble issues over the years, and while issue of Tarren Mill is important to us, Southshore requires our supervision as well."

 A16_baradin_isles_title: "Baradin Isles Lordship"
 A16_baradin_isles_desc: "To control the Baradin Bay, we must control the strategic isles. Many have been ruled by lesser nobles who have not managed to create any opposition to us, making it easy to call those lands ours."

 A16_dominate_baradin_bay_title: "Dominate Baradin Bay"
 A16_dominate_baradin_bay_desc: "Our strategic objective is secured. The Baradin Bay, upon which stands city of Stromgarde and many of our important lands is now under our grasp. With a powerful naval presence and coastal defences, we will make sure our people can live in peace upon those shores."

 # Column 4
 A16_restore_stromic_hearthland_title: "Restore the Stromic Hearthland"
 A16_restore_stromic_hearthland_desc: "With the current times whispering about great shift in power, we, the stormic people must act once more. While our current situation is but a shadow of the once proud Empire of Arathor, we must not forget that we are still their rightful heirs. Stromgarde sits upon Strom, the first of humanity great cities. But we are surrounded at all sides by those who want to see our precious kingdom burn. We will never all this! Glory to Stromgarde, may our enemies fear our might!"
 
 A16_secure_the_stromic_coast_title: "Secure the Coast"
 A16_secure_the_stromic_coast_desc: "Our efforts in fighting off the enemy forces and the inhuman creatures we tolerated far too long finally showed up efforts. Arathi Highlands are secured, at least for now. To our west, there are human kingdoms who can be both allies and enemies, so we must approach carefully. To the East, the enemy of our kind, Trolls call the lands their homes. Both have to be evaluated and reinforced. We must grow in strenght when enemies are so close."

 A16_country_militarization_title: "Countryside Militarization"
 A16_country_militarization_desc: "Stormic people have a long history of war. We were the first to unite humanity in the past, due to both our wisdom and strenght. Now, the time has come for us to do so again. Every man and woman, every elder and child, all must understand value of our might!"

 A16_proclaim_the_might_of_stromgarde_title: "Proclaim the Might of Stromgarde"
 A16_proclaim_the_might_of_stromgarde_desc: "Once more, we are on top. The long path from the Stromgarde Keep continues far and wide. We were not broken, instread breaking them. The power, the might, the glory is the tale that has once name. Stromgarde, the heir of Arathor!"

 # Column 5
 A16_restore_the_empire_of_arathor_title: "Restore the Empire of Arathor"
 A16_restore_the_empire_of_arathor_desc: "At long last, the unity is once more. The Seven Kingdoms of Men stand united under one banner. One people. One mission. No longer we just claim. Now, we are one! We are the Arathor reborn!"

 A16_protect_the_eastern_flank_title: "Protect the Eastern Flank"
 A16_protect_the_eastern_flank_desc: "While we have reclaimed our home territories, the menace of the forest trolls is right at our borders, mocking us from their temple-cities. Before we enter the enemy lands, we must prepare our defences, so that our people will not suffer the raids and pillages."

 A16_establish_hinterland_outpost_title: "Establish Hinterlands Outpost"
 A16_establish_hinterland_outpost_desc: "With the sword and shield in hand, hundreds of our brave warriors crossed the borders and conquered the first of many places that those primitives call civilization. The first spearhead is done, now we must prepare to destroy their resistance."

 A16_defeat_hinterlands_trolls_title: "Defeat of Hinterlands Trolls"
 A16_defeat_hinterlands_trolls_desc: "One by one they failed. Witherbark, Revantusk, Vilebranch. Names that only achivisits and bards will remember as reminders of the threat that once was. No more do they post any. The wooden palisades crumbled, the temples collapsed and their people surrendered or died. Jintha'alor, the holy temple-city now burns in blaze in glory. Stormic Glory."

 A16_trollbane_legacy_title: "Trollbane Legacy" 
 A16_trollbane_legacy_desc: "One does not simply abandon their legacy. Even with the forest beast put down all around Hinterlands, the trolls are not yet defeated. They could rise and become the issue once more. But Trollbanes do not give up easily. We will continue our mission to eradicate them, now not only near our border, but all acorss Lordaeron and Quel'thalas!"
 
