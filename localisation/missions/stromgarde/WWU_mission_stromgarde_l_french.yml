 stromgarde_countryside_militarization_trigger_tt: "Every province in §YArathi Highlands§! is owned by Stromgarde and has:\n- Barracks\n- Arsenal\n- Training Grounds"

 stromgarde_no_trolls_tt: "All provinces in §YThe Hinterlands§! are liberated from the §YTroll§! primitive rule."

 stromgarde_troll_defeat_mission_tt: "§GRewards:§!\nUnlock the Nobility Privilege §YTrollbane Duty§! which can be activated if we have any troll presence within our lands.\nGain §Y25§! Prestige or Monarch Power.\nGain §Y10§! Power Projection."

