l_english:
 #-----------------------------------------------
 # Dwarf
 #-----------------------------------------------
 wwu_dwarf.1.title: "Our Ancestral Home"
 wwu_dwarf.1.desc: "Since all three dwarven clans combined their strength, discussion of the ancient dwarven empire is often being put on table during the meetings of the three hammers. Most people claim that the lands of our homeland are rightfully ours and we should not hestiate to claim our right to rule these provinces.\n\nRecently, a topic had been brought up regarding one of these provinces, [dwarf_province_claim.GetName] under the rule of [dwarf_province_claim.Owner.GetName]. One of diplomats asserts that [dwarf_province_claim.Culture.GetName] peasants have asked for help against [dwarf_province_claim.Owner.GetAdjective] and according to the report, we can easily make a case for a rightful war against [dwarf_province_claim.Owner.GetName]. with the help of our friends, Of course.\n\n[dwarf_subject.Monarch.GetName] of [dwarf_subject.GetName] would be eager to help us in this cause, assuming they can provide some effort on their side."
 wwu_dwarf.1.option.a: "Ask [dwarf_subject.GetName] to help making our claim"
 wwu_dwarf.1.option.b: "Call [dwarf_subject.Monarch.GetName] to a coalition against [dwarf_province_claim.Owner.GetName]"
 wwu_dwarf.1.option.c: "Try to forge a claim without their help"
 wwu_dwarf.1.option.d: "Wait for a better moment"
 
 dwarf_territorial_tt_claim: "[dwarf_subject.GetName] will be asked for help to make a permanent claim for [dwarf_province_claim.GetName] province. This will cost them diplomatic power."
 dwarf_territorial_tt_war: "[dwarf_subject.GetName] will be asked for a coalition against [dwarf_province_claim.Owner.GetName]. This will cost them military power."
 
 wwu_dwarf.2.title: "Historical Friend in Need"
 wwu_dwarf.2.desc: "Since all three dwarven clans combined their strength, discussion of the ancient dwarven empire is often being put on table during the meetings of the three hammers. Most people claim that the lands of our homeland are rightfully ours and we should not hestiate to claim our right to rule these provinces.\n\nRecently, a topic had been brought up in Ironforge regarding one of their historic provinces, [dwarf_province_claim.GetName] under the rule of [dwarf_province_claim.Owner.GetName]. They wish make a case for a rightful war against [dwarf_province_claim.Owner.GetName] and they want us to back this claim."
 wwu_dwarf.2.option.a: "Accept their request"
 wwu_dwarf.2.option.b: "We cannot afford to steer our diplomatic power right now."
 
 wwu_dwarf.3.title: "A Coalition With a Historical Friend"
 wwu_dwarf.3.desc: "Since all three dwarven clans combined their strength, discussion about the ancient dwarf empire is often being put on table during the meetings of the three hammers. Most people claim that the lands of our homeland are rightfully ours and we should not hestiate to claim our right to rule these provinces.\n\nRecently, a topic had been brought up in Ironforge regarding one of their historic provinces, [dwarf_province_claim.GetName] under the rule of [dwarf_province_claim.Owner.GetName]. They wish to not only make a case for a rightful war against [dwarf_province_claim.Owner.GetName], they want to form a coalition against them. They believe us to be a part of this coalition."
 wwu_dwarf.3.option.a: "Accept their request"
 wwu_dwarf.3.option.b: "We cannot afford to steer our military power right now."
 
 wwu_dwarf.10.title: "Dwarven Treasurer"
 wwu_dwarf.10.desc: "As news of Unifying our ancient lands spread worldwide, dwarven nobles and commoners alike have started flock to our country. One of these is a world-famous dwarf treasurer who is an expert in economics. He offers his services to help us grow as a country."
 wwu_dwarf.10.option.a: "Invite him to court"
 wwu_dwarf.10.option.b: "Employ him on other areas"
 
 wwu_dwarf.11.title: "Dwarves At War"
 wwu_dwarf.11.desc: "As our fierce war against our enemies continues, dwarves around the globe, be they a mere peasant or a powerful noble, are doing their best to help our war effort. Recently, a group of adventuring guilds including Retired Mountaineers Society, The Three Hammers and Ironbeard Retinue united under one banner and rallied citizens to join the war."
 wwu_dwarf.11.option.a: "Praise the guilds!"
 
 #-----------------------------------------------
 # Uldaman
 #-----------------------------------------------
 wwu_mission_a29_uldaman.1.title: "Ironband's Excavation!"
 wwu_mission_a29_uldaman.1.desc: "Our leading explorer Ironband claims that here in Loch Modan lies a lead towards a place of our origin. This excavation may lead us to the answers of our origin as well as give us access to technologies of our makers. Ironband is asking for a financial contribution to hasten the proccess."
 wwu_mission_a29_uldaman.1.option.a: "We must find the answers! Give them everything!"
 wwu_mission_a29_uldaman.1.option.b: "It is sounds interesting. Throw them a bone."
 wwu_mission_a29_uldaman.1.option.c: "I don't care. Let him play in the dirt."
 
 wwu_mission_a29_uldaman.2.title: "Ironband's Excavation Results"
 wwu_mission_a29_uldaman.2.desc: "Ironband claims he has some kind of access codes and a map that could lead to a temple. It will take some time to follow the map."
 wwu_mission_a29_uldaman.2.option.a: "Make sure to hide it from the spies, and make sure they are supervised!"
 wwu_mission_a29_uldaman.2.option.b: "Who cares what garbage they dug up?! Let them do what ever they want."
 
 wwu_mission_a29_kot_responce.1.title: "Bronzbeard Excavation"
 wwu_mission_a29_kot_responce.1.desc: "My Emperor! Our spies in Loch Modan tell us that the Bronzbeards started to dig inside ruins. Does your highness wish to do anything?"
 wwu_mission_a29_kot_responce.1.option.a: "Who cares? We have our own things to deal with!"
 wwu_mission_a29_kot_responce.1.option.b: "We can start our own excavation! I know a place!"
 wwu_mission_a29_kot_responce.1.option.c: "Let our spies continue to monitor the Bronzebeards."
 
 wwu_mission_a29_kot_digs.1.title: "Start Digging"
 wwu_mission_a29_kot_digs.1.desc: "My Emperor, we finally secured the dig site but we lack the manpower to start the excavation."
 wwu_mission_a29_kot_digs.1.option.a: "Send everyone to start diggin!"
 wwu_mission_a29_kot_digs.1.option.b: "Nothing we can do... Just figure something on your own."
 
 wwu_mission_a29_kot_digs.2.title: "Excavation Reustls"
 wwu_mission_a29_kot_digs.2.desc: "My Emperor our lead archeologist says that he found some kind of a code and a crude map! It will take some time to follow the map."
 wwu_mission_a29_kot_digs.2.option.a: "Great! Let me know when we will know where the map leads to."
 
 wwu_mission_a29_kot_responce.2.title: "Bronzbeard Excavation Finished"
 wwu_mission_a29_kot_responce.2.desc: "My Emperor! Our spies in Loch Modan tell us that the Bronzbeards have finished digging and are bringing something to Ironforge! We believe it is important to try and steal it to hinder the Bronzbeards advances in whatever they have found!"
 wwu_mission_a29_kot_responce.2.option.a: "Create a diversion to make it look like we set out to destroy it as our spies steal it!"
 wwu_mission_a29_kot_responce.2.option.b: "Have our spies try to steal it or copy it!"
 wwu_mission_a29_kot_responce.2.option.c: "Let our spies watch over what the Bronzebeards are going to do with their new find."
 
 wwu_mission_a29_kot_responce.3.title: "We got the codes..."
 wwu_mission_a29_kot_responce.3.desc: "My Emperor! The operation to steal and burn the Bronzbeards findings was half success. They had tight security and trough the sacrifice of our men we managed to get a coppy of some kind of code without arising suspicion, they think we failed. It also looks like the Bronzbeards are insulted by our actions."
 wwu_mission_a29_kot_responce.3.option.a: "Bah! The Bronzbeard Clan is too soft to do anything about it. Lets see where they planned to use the codes."
 
 wwu_mission_a29_uldaman.3.title: "Badlands Camp"
 wwu_mission_a29_uldaman.3.desc: "Sir, Ironband expedition sends a word that they set up camp in Badlands.They claim they are on the brink of some large discovery. They also request aid to fortify their possitions as they are near to the fortress bellonging to Shadowforge. "
 wwu_mission_a29_uldaman.3.option.a: "Great! Aid them with soldiers and build them a rampart to divert anyone with ill intentions!"
 wwu_mission_a29_uldaman.3.option.b: "Tell him that we have no resources to spare!"
 wwu_mission_a29_uldaman.3.option.c: "Fortify their possition, build a proper outpost and supply them with the might of Ironforge!
 
 wwu_mission_a29_uldaman.4.title: "Disaster!"
 wwu_mission_a29_uldaman.4.desc: "My King our capital was devastated in a planned attack led by the Shadowforge! We managed to deflect them but the damage was still inflicted to Ironforge. Commonfolk find their property and possesions looted or destroyed. Guards report that some spies of the Shadowforge tried to enter the vault unsuccessfuly. Other guards report that the vault guards took part in reflecting the attack on Ironforge. What shall we do?"
 wwu_mission_a29_uldaman.4.option.a: "We must help our people first and then deal with the whelps of Shadowforge!"
 wwu_mission_a29_uldaman.4.option.b: "How dare those banished whelps attack our city?! Send them a warning and plan for retaliation!"
 wwu_mission_a29_uldaman.4.option.c: "This won't do! Send a warning to Shadowforge. In the meant time I assign our advisors to oversee aid to the people of Ironforge. As well as aid Ironband in his findings, looks like Thaurissan took interest in his work."
 
 wwu_mission_a29_uldaman.5.title: "Disaster"
 wwu_mission_a29_uldaman.5.desc: "My King our capital was devastated in a planned attack led by the Shadowforge! We managed to deflect them but the damage was still inflicted to Ironforge. Commonfolk find their property and possesions looted or destroyed. Ironband also reports that his office was set on fire. What shall we do?""
 wwu_mission_a29_uldaman.5.option.a: "We must help our people first and then deal with the whelps of Shadowforge!"
 wwu_mission_a29_uldaman.5.option.b: "How dare those banished whelps attack our city?! Send them a warning and plan for retaliation!"
 wwu_mission_a29_uldaman.5.option.b: "This won't do! Send a warning to Shadowforge. In the meant time I assign our advisors to oversee aid to the people of Ironforge. As well as aid Ironband in his findings, looks like Thaurissan took interest in his work."
 
 wwu_mission_a29_kot_responce.4.title: "Mission Success!"
 wwu_mission_a29_kot_responce.4.desc: "My Emperor! The mission to destroy the findings of the Bronzbeards in Ironforge was a success.In Ironband's office in Ironforge we found codes of some sort. It looks like they did not care to secure the codes they have found. Our spies stole the codes during the diversion that we planned. Though the Bronzbeards are now warry of our actions."
 wwu_mission_a29_kot_responce.4.option.a: "Great! Glory to the Shadow Forge. As for the Bronzbeards those drunkards can be warry of their own shadows for all I care!"
 
 wwu_mission_a29_kot_responce.5.title: "Mission Failed!"
 wwu_mission_a29_kot_responce.5.desc: "My Emperor! Our spies failed to get in the vaults of Ironforge.The good news is that our presence remained undetected. Yet the fact remains that it looks like what ever the Bronzbeards dug up in Loch Modan they intend to guard it."
 wwu_mission_a29_kot_responce.5.option.a "Baaah! Hang the spies who failed and keep a close eye on what those wretches in Ironforge are planning to do!"
 
 wwu_mission_a29_kot_responce.6.title: "Mission Success!"
 wwu_mission_a29_kot_responce.6.desc: "My Emperor! Our spies managed to copy the codes Ironforge has unearthed in Loch Modan. To our surpise those fools did not think to guard their findings and kept them in the Ironband's office."
 wwu_mission_a29_kot_responce.6.option.a: "Hahaha! Those fools! Great job, try to decode the codes and keep a look out on what they plan to use the codes for."
 
 wwu_mission_a29_kot_responce.7.title: "Ironforge Camp"
 wwu_mission_a29_kot_responce.7.desc: "My Emperor! Ironforge set up a capm in Badlands next to Angor! It seems to be a small expeditionary force."
 wwu_mission_a29_kot_responce.7.option.a: "Let them settle for now, and continue to monitor their movements!"
 
 wwu_mission_a29_kot_responce.8.title: "Ironforge Camp"
 wwu_mission_a29_kot_responce.8.desc: "My Emperor! Ironforge set up a capm in Badlands next to Angor! They have brought an army with them and it looks like they are reinforcing it!"
 wwu_mission_a29_kot_responce.8.option.a: "Those wretches! We must seeze a moment and destroy that camp!"
 
 wwu_mission_a29_kot_responce.9.title: "Ironforge on the move!"
 wwu_mission_a29_kot_responce.9.desc: "My Emperor! Ironforge expedition started to prepare to move into the caves where they were digging trough some sort of ruins. It looks like they are taking most of their supplies with them. Should we move in before them?"
 wwu_mission_a29_kot_responce.9.option.a: "Let me think about it..."
 
 wwu_mission_a29_uldaman.6.title: "Badlands Expedition"
 wwu_mission_a29_uldaman.6.desc: "My King, Ironband report that they found entrance to the ruins they were excavating in Badlands. He is prepared to move in as soon as you give your blessing. It is crucial we have keep our camp in Badlands to move into the ruins."
 wwu_mission_a29_uldaman.6.option.a: "Great news! I will announce the start of the expedition when I am ready!"