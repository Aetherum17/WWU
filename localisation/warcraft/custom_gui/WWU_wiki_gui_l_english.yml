 # Overview
 wiki_text_class_overview_top: "Overview"
 wiki_text_class_overview_info: "A ruler may train into one of the twelve classes present in Azeroth.\n\nTo do this, they will need to undertake a §YClass Study§! within the §YCourt§! menu.\n\nEach month, the ruler has a chance to gain §Y0.1§! to §Y1.0§! progress points within their study.\nOnce this value reaches §Y100§!, they will be assigned the class.\n\nEach class will bestow the ruler with a passive modifier and three active abilities.\nThe active abilities cost §YEnergy§! to use.\n\n§YEnergy§! has a §Y5%§! chance to regenerate by §Y1§! each month, capping at a maximum of §Y5§!.\n\n§YInstitutional Knowledge§! for each class is built up when a ruler learns that class.\nThis adds §Y+20§! to the starting progress points of §YClass Study§! for future rulers that study that class.\nThe maximum starting progress points this can apply is §Y+80§!."
 
 # Warrior
 wiki_text_class_warrior_top: "Warrior"
 wiki_text_class_warrior_info: "A ruler that has trained as a Warrior has the following passive modifier:\n\n§YWisdom of the Warrior§!\n+0.5 Army Tradition\n\n\n\nAdditionally, they possess the following three abilities:"
 
 wiki_class_warrior_ability_1_text: "Unrelenting Assault"
 wiki_class_warrior_ability_2_text: "Second Wind"
 wiki_class_warrior_ability_3_text: "Battle Shout"
 
 # Paladin
 wiki_text_class_paladin_top: "Paladin"
 wiki_text_class_paladin_info: "A ruler that has trained as a Paladin has the following passive modifier:\n\n§YWisdom of the Paladin§!\n-0.03 War Exhaustion\n\n\n\nAdditionally, they possess the following three abilities:"
 
 wiki_class_paladin_ability_1_text: "Blade of Justice"
 wiki_class_paladin_ability_2_text: "Long Arm of the Law"
 wiki_class_paladin_ability_3_text: "Sanctified Wrath"
 
