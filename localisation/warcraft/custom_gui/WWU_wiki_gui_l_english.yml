 # Overview
 wiki_text_magic_overview_top: "Overview"
 wiki_text_magic_overview_info: "A ruler may train as a spellcaster within one of the twenty schools of magic.\n\nTo do this, they will need to undertake a §YMagical Study§! within the §YCourt§! menu.\n\nEach month, the ruler has a chance to gain §Y0.1§! to §Y1.0§! progress points within their study.\nOnce this value reaches §Y100§!, they will be become a spellcaster, gaining access to ten generic spells.\n\nThe school the ruler chose will grant additional school-specific spells.\nEach spell costs §YMana§! to use.\n\n§YMana§! has a §Y5%§! chance to regenerate by §Y1§! each month, capping at a maximum of §Y10§!.\n\n§YInstitutional Knowledge§! is built up when a ruler learns to become a spellcaster.\nThis adds §Y+5§! to the starting progress points of §YMagical Study§! for future rulers that study spellcasting.\nThe maximum starting progress points this can apply is §Y+80§!.\n\nEach spellcaster has three stats:\n\n§YAptitude§!\nReduces the amount of mana each spell costs.\n\n§YFinesse§!\nIncreases the potency of each spell.\n\n§YConcentration§!\nIncreases the duration of spells that apply modifiers over a duration."
 
